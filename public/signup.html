<main class="auth-shell">
  <form class="auth-card" onsubmit="event.preventDefault();window.location='/app/projects.html'">
    <div>
      <h1>Create your showroom</h1>
      <p class="sub">20 free generation tokens. No credit card required.</p>
    </div>

    <div class="social-row">
      <button class="btn" type="button"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1H12v3.2h5.35c-.23 1.4-1.6 4.1-5.35 4.1-3.22 0-5.85-2.65-5.85-5.9s2.63-5.9 5.85-5.9c1.83 0 3.05.78 3.75 1.45L17.85 5.6C16.4 4.25 14.45 3.5 12 3.5 6.75 3.5 2.5 7.75 2.5 13s4.25 9.5 9.5 9.5c5.5 0 9.1-3.85 9.1-9.3 0-.62-.05-1.1-.15-1.6z"/></svg>Google</button>
      <button class="btn" type="button"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 1.4c0 1.1-.5 2.2-1.3 3-.9.8-2.2 1.5-3.4 1.4-.1-1.1.4-2.2 1.2-3 .8-.9 2.2-1.5 3.5-1.4zM20 17.4c-.5 1.1-.8 1.6-1.4 2.6-.9 1.4-2.2 3.1-3.8 3.1-1.4 0-1.8-.9-3.8-.9s-2.4.9-3.8.9c-1.6 0-2.8-1.6-3.7-2.9-2.5-3.7-2.8-8-1.2-10.3 1.1-1.6 2.9-2.6 4.6-2.6 1.7 0 2.8.9 4.2.9 1.4 0 2.2-.9 4.2-.9 1.5 0 3.1.8 4.2 2.2-3.7 2-3.1 7.3.5 7.9z"/></svg>Apple</button>
    </div>

    <div class="divider">or with email</div>

    <div class="field">
      <label>Showroom name</label>
      <input type="text" placeholder="Studio Milano" required>
    </div>
    <div class="field">
      <label>Country</label>
      <select required>
        <option>Italy</option><option>Germany</option><option>France</option><option>Spain</option><option>United Kingdom</option><option>Ukraine</option><option>United States</option>
      </select>
    </div>
    <div class="field">
      <label>Work email</label>
      <input type="email" placeholder="maria@studio-milano.it" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="At least 8 characters" required>
      <div class="hint">Must include 1 uppercase, 1 number and 1 symbol.</div>
    </div>

    <label style="display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text-2)">
      <input type="checkbox" required style="margin-top:3px">
      I agree to the <a href="#" style="color:var(--gold)">Terms of Service</a> and <a href="#" style="color:var(--gold)">Privacy Policy</a>.
    </label>

    <button class="btn btn-primary btn-block" style="padding:14px" type="submit">Create account · Get 20 tokens</button>

    <div class="auth-foot">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
  </form>
</main>
