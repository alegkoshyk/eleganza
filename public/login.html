<main class="auth-shell">
  <form class="auth-card" onsubmit="event.preventDefault();window.location='/app/projects.html'">
    <div>
      <h1>Welcome back</h1>
      <p class="sub">Sign in to your Eleganza showroom workspace.</p>
    </div>

    <div class="social-row">
      <button class="btn" type="button">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1H12v3.2h5.35c-.23 1.4-1.6 4.1-5.35 4.1-3.22 0-5.85-2.65-5.85-5.9s2.63-5.9 5.85-5.9c1.83 0 3.05.78 3.75 1.45L17.85 5.6C16.4 4.25 14.45 3.5 12 3.5 6.75 3.5 2.5 7.75 2.5 13s4.25 9.5 9.5 9.5c5.5 0 9.1-3.85 9.1-9.3 0-.62-.05-1.1-.15-1.6z"/></svg>
        Google
      </button>
      <button class="btn" type="button">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 1.4c0 1.1-.5 2.2-1.3 3-.9.8-2.2 1.5-3.4 1.4-.1-1.1.4-2.2 1.2-3 .8-.9 2.2-1.5 3.5-1.4zM20 17.4c-.5 1.1-.8 1.6-1.4 2.6-.9 1.4-2.2 3.1-3.8 3.1-1.4 0-1.8-.9-3.8-.9s-2.4.9-3.8.9c-1.6 0-2.8-1.6-3.7-2.9-2.5-3.7-2.8-8-1.2-10.3 1.1-1.6 2.9-2.6 4.6-2.6 1.7 0 2.8.9 4.2.9 1.4 0 2.2-.9 4.2-.9 1.5 0 3.1.8 4.2 2.2-3.7 2-3.1 7.3.5 7.9z"/></svg>
        Apple
      </button>
    </div>

    <div class="divider">or with email</div>

    <div class="field">
      <label>Email</label>
      <input type="email" placeholder="maria@studio-milano.it" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="••••••••" required>
      <div class="hint" style="display:flex;justify-content:space-between"><span></span><a href="#" style="color:var(--gold)">Forgot password?</a></div>
    </div>

    <button class="btn btn-primary btn-block" style="padding:14px" type="submit">Sign in</button>

    <div class="auth-foot">
      Don't have an account? <a href="/signup.html">Create one</a>
    </div>
  </form>
</main>

<div class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">

      <button class="menu-btn" id="closeDrawer">×</button>
    </div>
    <a class="nav-item" href="/">Home</a>
